<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>한자 표</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app" id="appRoot">
      <header class="toolbar">
        <div class="paging">
          <button id="prevPage" type="button" aria-label="이전 페이지">
            이전
          </button>
          <span id="pageLabel">1 / 1</span>
          <button id="nextPage" type="button" aria-label="다음 페이지">
            다음
          </button>
        </div>
        <div class="modes">
          <div class="selection-shape-control" aria-label="영역선택 방식">
            <span class="selection-shape-label">영역선택</span>
            <button
              id="selectionShapeToggle"
              class="selection-shape-toggle"
              type="button"
              aria-pressed="false"
              aria-label="영역선택 방식 전환"
              title="드래그 선택 방식을 PATH와 RECT 사이에서 전환"
            >
              <span class="selection-shape-toggle__option" data-shape-option="path">PATH</span>
              <span class="selection-shape-toggle__option" data-shape-option="rect">RECT</span>
            </button>
          </div>
          <div class="mode-group" aria-label="누르면 계속 보여 주기">
            <span class="mode-title">고정</span>
            <button type="button" data-toggle-mode="ko" title="한국 훈/음 고정">
              한
            </button>
            <button type="button" data-toggle-mode="jp" title="일본어 뜻/음 고정">
              일
            </button>
            <button type="button" data-toggle-mode="c" title="일본어 예시 고정">
              예
            </button>
          </div>
          <div class="mode-group" aria-label="누르는 동안만 보여 주기">
            <span class="mode-title">홀드</span>
            <button type="button" data-hold-mode="ko" title="누르는 동안 한국 훈/음">
              한
            </button>
            <button type="button" data-hold-mode="jp" title="누르는 동안 일본어 뜻/음">
              일
            </button>
            <button type="button" data-hold-mode="c" title="누르는 동안 일본어 예시">
              예
            </button>
          </div>
        </div>
      </header>

      <section id="grid" class="grid" aria-label="한자 목록"></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
